<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Delivery – Groceries at Rocket Speed</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="rd-shell">

    <!-- SIDEBAR (desktop) -->
    <aside class="rd-sidebar" id="rd-sidebar"></aside>

    <!-- TOPBAR -->
    <header class="rd-topbar" id="rd-topbar"></header>

    <!-- MAIN CONTENT -->
    <main class="rd-main" id="rd-main"></main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="rd-bottomnav" id="rd-bottomnav"></nav>

  </div>

  <!-- TOAST -->

      <div class="rd-footer-brand">🚀 Rocket Delivery</div>
      <p>Groceries delivered at rocket speed — fresh, fast, and always on time.</p>
      <div class="rd-footer-links">
        <span onclick="goTo('home')">Home</span>
        <span onclick="goTo('shop')">Shop</span>

      </div>
      <p class="rd-copyright">© 2026 Rocket Delivery. Fueled by fresh groceries and fast pilots.</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
